<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="OtakuFun — La voix des animés. Amateur d'animés ou simple curieux, plongez dans les citations les plus marquantes du genre.">
    <title>OtakuFun</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="print.css" media="print">

</head>

<body>
    <header class="site-header">
        <a href="index.html" class="logo">OtakuFun</a>
        <nav class="site-nav">
            <a href="index.html">Accueil</a>
            <a href="quotes.html">Quotes</a>
            <a href="contact.html" aria-current="page">Contactez-moi</a>
        </nav>
    </header>

    <section class="contact">
        <div class="contact__intro">
            <h1 class="contact__title">
                Partagez vos <em>idées</em> et vos questions.
            </h1>
            <p class="contact__lead">
                C'est avec plaisir que je m'en inspirerai pour vous transmettre ma passion encore mieux.
            </p>
        </div>

        <form action="#" method="post" class="contact-form">
            <div class="field">
                <label for="name" class="field__label">Nom</label>
                <input type="text" name="user_name" id="name" class="field__input" required />
            </div>

            <div class="field">
                <label for="mail" class="field__label">E-mail</label>
                <input type="email" name="user_mail" id="mail" class="field__input" required />
            </div>

            <div class="field">
                <label for="msg" class="field__label">Message</label>
                <textarea name="user_message" id="msg" class="field__input field__input--area" rows="6" required></textarea>
            </div>

            <button type="submit" class="contact-form__submit">Envoyer le message</button>
        </form>
    </section>
    
    <footer class="site-footer">
        <div class="site-footer__brand">
            OtakuFun
        </div>
        <div class="site-footer__credit">
            Designed By IAD
        </div>
    </footer>
</body>

</html>
